<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Sam CLI overview</title>
  <desc id="desc">A diagram showing Chrome media sources flowing through Sam CLI into local JSON exports and SQLite databases.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101828"/>
      <stop offset="1" stop-color="#173b45"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1120" height="560" rx="24" fill="url(#bg)"/>
  <text x="64" y="74" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="700">Sam CLI</text>
  <text x="64" y="112" fill="#b6c5d6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Syncing Automatically Media, written by Sam the local agent</text>

  <g filter="url(#shadow)">
    <rect x="64" y="176" width="245" height="210" rx="14" fill="#f8fafc"/>
    <text x="88" y="218" fill="#101828" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">Chrome profile</text>
    <text x="88" y="256" fill="#344054" font-family="Inter, ui-sans-serif, system-ui" font-size="16">YouTube History</text>
    <text x="88" y="286" fill="#344054" font-family="Inter, ui-sans-serif, system-ui" font-size="16">YouTube Music History</text>
    <text x="88" y="316" fill="#344054" font-family="Inter, ui-sans-serif, system-ui" font-size="16">WhatsApp Web</text>
    <rect x="88" y="342" width="132" height="28" rx="7" fill="#e0f2fe"/>
    <text x="104" y="362" fill="#075985" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">cloned temp</text>
  </g>

  <path d="M330 280 H442" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round"/>
  <path d="M430 265 L452 280 L430 295" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="468" y="154" width="235" height="254" rx="16" fill="#ffffff"/>
    <text x="494" y="198" fill="#101828" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="800">sam</text>
    <text x="494" y="232" fill="#344054" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">export-youtube-history</text>
    <text x="494" y="262" fill="#344054" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">youtube-latest</text>
    <text x="494" y="292" fill="#344054" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">youtube-video</text>
    <text x="494" y="322" fill="#344054" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">log-whatsapp-web</text>
    <rect x="494" y="352" width="162" height="30" rx="7" fill="#dcfce7"/>
    <text x="510" y="372" fill="#166534" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">local-first sync</text>
  </g>

  <path d="M724 280 H816" stroke="#86efac" stroke-width="5" stroke-linecap="round"/>
  <path d="M804 265 L826 280 L804 295" fill="none" stroke="#86efac" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="846" y="176" width="210" height="210" rx="14" fill="#f8fafc"/>
    <text x="870" y="218" fill="#101828" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">Local data</text>
    <text x="870" y="256" fill="#344054" font-family="Inter, ui-sans-serif, system-ui" font-size="16">JSON exports</text>
    <text x="870" y="286" fill="#344054" font-family="Inter, ui-sans-serif, system-ui" font-size="16">SQLite history</text>
    <text x="870" y="316" fill="#344054" font-family="Inter, ui-sans-serif, system-ui" font-size="16">Transcripts</text>
    <text x="870" y="346" fill="#344054" font-family="Inter, ui-sans-serif, system-ui" font-size="16">Agent context</text>
  </g>

  <text x="64" y="480" fill="#dbeafe" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">sam youtube-latest --limit 20  ->  recent videos and podcast-like listens</text>
</svg>

